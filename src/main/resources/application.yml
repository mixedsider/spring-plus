server:
  port: 8080

spring:
  config:
    import: optional:file:.env[.properties]
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
  cloud:
    aws:
      credentials:
        access-key: ${ACCESS_KEY}
        secret-key: ${PRIVATE_ACCESS_KEY}
      region:
        static: ${STATIC_REGION}
      s3:
        bucket: ${BUCKEY_NAME}
        region: ${S3REGION}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false


management:
  endpoint:
    health:
      show-details: when_authorized
  endpoints:
    jmx:
      exposure:
        include: health


jwt:
  secret:
    key: ${JWT_SECRET_KEY}

