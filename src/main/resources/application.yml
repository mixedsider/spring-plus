server:
  port: 8080

spring:
  config:
    import: optional:file:.env[.properties]
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
  cloud:
    aws:
      credentials:
        access-key: ${ACCESS_KEY}
        secret-key: ${PRIVATE_ACCESS_KEY}
      region:
        static: ap-southeast-2
      s3:
        bucket: ${BUCKEY_NAME}
        region: ap-southeast-2


management:
  endpoint:
    health:
      show-details: when_authorized
  endpoints:
    jmx:
      exposure:
        include: health

jwt:
  secret:
    key: ${JWT_SECRET_KEY}

