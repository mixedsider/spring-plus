server:
  port: 8080

spring:
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
  cloud:
    aws:
      credentials:
        access-key: ${ACCESS_KEY}
        secret-key: ${PRIVATE_ACCESS_KEY}
      region:
        static: ap-northeast-2
      s3:
        bucket: ${BUCKEY_NAME}
  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        use_sql_comments: true


management:
  endpoint:
    health:
      show-details: when_authorized
  endpoints:
    jmx:
      exposure:
        include: health


jwt:
  secret:
    key: ${JWT_SECRET_KEY}

